name: Build CUMA Multiplataforma

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Windows
        shell: cmd
        run: |
          call "arquivos necessários\Windows\criar_windows.bat"
      - uses: actions/upload-artifact@v4
        with:
          name: CUMA_windows
          path: "ZIP final/Windows/CUMA_windows.zip"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-tk libgl1 libglib2.0-0 xdg-utils
      - name: Build Linux
        run: |
          chmod +x "arquivos necessários/Linux/criar_linux_tar.sh"
          "arquivos necessários/Linux/criar_linux_tar.sh"
      - uses: actions/upload-artifact@v4
        with:
          name: CUMA_linux
          path: "ZIP final/Linux/CUMA_linux.tar.gz"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build macOS
        run: |
          chmod +x "arquivos necessários/macOS/criar_macos_zip.sh"
          "arquivos necessários/macOS/criar_macos_zip.sh"
      - uses: actions/upload-artifact@v4
        with:
          name: CUMA_macos
          path: "ZIP final/macOS/CUMA_macos.zip"
